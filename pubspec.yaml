name: vibely
description: "A flutter based video sharing social network app made with flutter and supabase."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.3.0
  simple_circular_progress_bar: ^1.0.2
  get: ^4.7.3
  dio: ^5.9.2
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  video_player: ^2.10.1
  video_compress: ^3.1.4
  video_thumbnail: ^0.5.6
  uuid: ^4.5.2
  share_plus: ^12.0.1

 
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter: 
  uses-material-design: true
  assets:
    - .env

  
